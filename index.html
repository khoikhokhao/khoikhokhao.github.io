<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Phạm Minh Khôi</title>
  <meta
    name="description"
    content="Trang cá nhân của Phạm Minh Khôi — AI Engineer, Quantitative Researcher và nhà phát triển MK QuantLab."
  />

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>

<body>
  <main class="profile">
    <img
      src="avatar.jpg"
      alt="Ảnh đại diện Phạm Minh Khôi"
      class="avatar"
    />

    <h1>Phạm Minh Khôi</h1>
    <p class="subtitle">AI Engineer & Quantitative Researcher</p>

    <section class="links">
      <a
        href="https://docs.google.com/document/d/1K7Yf2QRP3zM04BnNLmWLjN7GJ653kHk1xWEAn-EM0bg/edit?usp=sharing"
        class="card main-card"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="main-card-icon">
          <i class="fa-solid fa-chart-line"></i>
        </div>

        <div>
          <h2>Hợp tác đầu tư</h2>
          <p>Tìm hiểu về MK QuantLab và cơ hội hợp tác về vốn</p>
        </div>

        <i class="fa-solid fa-arrow-up-right-from-square arrow-icon"></i>
      </a>

      <div class="socials">
        <a
          href="https://www.linkedin.com/in/minhkhoi-ai-finance/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn của Phạm Minh Khôi"
        >
          <i class="fa-brands fa-linkedin"></i>
          <span>LinkedIn</span>
        </a>

        <a
          href="https://www.facebook.com/minhkhoi.aifinance"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Facebook của Phạm Minh Khôi"
        >
          <i class="fa-brands fa-facebook"></i>
          <span>Facebook</span>
        </a>

        <a
          href="https://www.tiktok.com/@greypham.aiquant"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="TikTok của Phạm Minh Khôi"
        >
          <i class="fa-brands fa-tiktok"></i>
          <span>TikTok</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
